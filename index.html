<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CSS Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stylemobile.css">
  <style>
    :root {
        --primary-color: #4361ee;
        --primary-hover: #3a56d4;
        --secondary-color: #6c757d;
        --success-color: #2ed573;
        --danger-color: #ff4757;
        --light-color: #f8f9fa;
        --dark-color: #212529;

        /* Light Mode Colors */
        --light-bg: linear-gradient(180deg, #69b8ff 0%, #9fd8ff 30%, #dff6ff 68%, #fef7df 100%);
        --light-sun-color: #ffd34d;
        --light-cloud-color: rgba(255, 255, 255, 0.82);
        --light-cloud-shadow: rgba(255, 255, 255, 0.35);
        --light-sky-glow: rgba(255, 244, 184, 0.42);
        --light-haze: rgba(255, 255, 255, 0.22);

        /* Dark Mode Colors */
        --dark-bg: radial-gradient(circle at top, #172554 0%, #0f172a 38%, #050816 100%);
        --dark-moon-color: #f8f3d6;
        --dark-star-color: rgba(255, 255, 255, 0.82);
        --dark-night-color: #050816;
        --aurora-a: rgba(99, 102, 241, 0.22);
        --aurora-b: rgba(34, 197, 94, 0.16);
        --aurora-c: rgba(56, 189, 248, 0.14);

        --card-bg: rgba(255, 255, 255, 0.72);
        --text-color: #1f2937;
        --text-light: #6b7280;
        --border-color: rgba(255, 255, 255, 0.32);
        --shadow: 0 20px 45px rgba(15, 23, 42, 0.18);
        --transition: all 0.35s ease;
    }

    [data-theme="dark"] {
        --card-bg: rgba(12, 18, 34, 0.72);
        --text-color: #e5eefc;
        --text-light: #9aa7c2;
        --border-color: rgba(255, 255, 255, 0.08);
        --shadow: 0 22px 50px rgba(0, 0, 0, 0.4);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    html {
        color-scheme: light;
    }

    html[data-theme="dark"] {
        color-scheme: dark;
    }

    body {
        background: var(--light-bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
        transition: background 0.9s ease, color 0.35s ease;
    }

    html[data-theme="dark"] body {
        background: var(--dark-bg);
    }

    .sky-background {
        position: absolute;
        inset: 0;
        z-index: -2;
        overflow: hidden;
        isolation: isolate;
    }

    .sky-background::before,
    .sky-background::after {
        content: '';
        position: absolute;
        inset: -10%;
        pointer-events: none;
        transition: opacity 0.8s ease;
    }

    .sky-background::before {
        background:
            radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.35), transparent 18%),
            radial-gradient(circle at 82% 14%, rgba(255, 240, 164, 0.4), transparent 14%),
            radial-gradient(circle at 50% 120%, rgba(255, 221, 150, 0.26), transparent 35%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 55%);
        opacity: 1;
        animation: skyBreath 10s ease-in-out infinite;
    }

    .sky-background::after {
        background:
            radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.08), transparent 18%),
            radial-gradient(circle at 75% 18%, var(--aurora-a), transparent 24%),
            radial-gradient(circle at 55% 10%, var(--aurora-b), transparent 22%),
            radial-gradient(circle at 48% 0%, var(--aurora-c), transparent 28%);
        opacity: 0;
        animation: auroraShift 18s ease-in-out infinite;
    }

    html[data-theme="dark"] .sky-background::before {
        opacity: 0.1;
    }

    html[data-theme="dark"] .sky-background::after {
        opacity: 1;
    }

    .sky-gradient,
    .stars-layer,
    .cloud-layer,
    .horizon-glow,
    .aurora {
        position: absolute;
        inset: 0;
        pointer-events: none;
    }

    .sky-gradient {
        background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 35%, rgba(255,255,255,0.18) 100%);
        mix-blend-mode: screen;
    }

    .horizon-glow {
        inset: auto -10% -18%;
        height: 50%;
        background: radial-gradient(circle at 50% 0%, rgba(255, 216, 148, 0.46), transparent 58%);
        filter: blur(24px);
        opacity: 1;
        transition: opacity 0.8s ease;
        animation: horizonPulse 7s ease-in-out infinite;
    }

    html[data-theme="dark"] .horizon-glow {
        opacity: 0.35;
        background: radial-gradient(circle at 50% 0%, rgba(85, 122, 255, 0.36), transparent 60%);
    }

    .aurora {
        opacity: 0;
        transition: opacity 0.8s ease;
    }

    .aurora::before,
    .aurora::after {
        content: '';
        position: absolute;
        width: 55vw;
        height: 55vw;
        border-radius: 45% 55% 60% 40%;
        filter: blur(55px);
        mix-blend-mode: screen;
        animation: auroraFloat 14s ease-in-out infinite alternate;
    }

    .aurora::before {
        top: -18%;
        left: -8%;
        background: radial-gradient(circle, rgba(76, 201, 240, 0.18), transparent 60%);
    }

    .aurora::after {
        top: -22%;
        right: -10%;
        background: radial-gradient(circle, rgba(129, 140, 248, 0.22), transparent 62%);
        animation-duration: 17s;
    }

    html[data-theme="dark"] .aurora {
        opacity: 1;
    }

    .sun {
        position: absolute;
        width: 118px;
        height: 118px;
        background: radial-gradient(circle, #fff5b0 0%, var(--light-sun-color) 42%, #ffb703 72%, rgba(255, 183, 3, 0.1) 100%);
        border-radius: 50%;
        top: 58px;
        right: 12%;
        box-shadow:
            0 0 0 14px rgba(255, 223, 107, 0.18),
            0 0 60px 16px rgba(255, 215, 0, 0.45),
            0 0 120px 28px rgba(255, 207, 74, 0.22);
        animation: sunDrift 16s ease-in-out infinite, sunGlow 5s ease-in-out infinite;
    }

    .sun::before,
    .sun::after {
        content: '';
        position: absolute;
        inset: -14px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.18);
        animation: sunRing 9s linear infinite;
    }

    .sun::after {
        inset: -28px;
        animation-duration: 14s;
        opacity: 0.55;
    }

    .sun-rays {
        position: absolute;
        top: 58px;
        right: 12%;
        width: 118px;
        height: 118px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, rgba(255,255,255,0) 0deg 12deg, rgba(255,234,167,0.55) 12deg 18deg, rgba(255,255,255,0) 18deg 45deg);
        filter: blur(1px);
        animation: spinSlow 24s linear infinite;
        opacity: 0.7;
    }

    .cloud-layer {
        z-index: 0;
    }

    .cloud {
        position: absolute;
        background: linear-gradient(180deg, rgba(255,255,255,0.95), var(--light-cloud-color));
        border-radius: 999px;
        filter: blur(0.5px);
        box-shadow: 0 18px 35px var(--light-cloud-shadow);
        will-change: transform;
    }

    .cloud:before,
    .cloud:after {
        content: '';
        position: absolute;
        background: inherit;
        border-radius: 50%;
    }

    .cloud-1 {
        width: 150px;
        height: 48px;
        top: 110px;
        left: -12%;
        animation: driftCloud 30s linear infinite;
    }
    .cloud-1:before {
        width: 60px;
        height: 60px;
        top: -28px;
        left: 12px;
    }
    .cloud-1:after {
        width: 82px;
        height: 82px;
        top: -40px;
        left: 46px;
    }

    .cloud-2 {
        width: 190px;
        height: 58px;
        top: 220px;
        left: -22%;
        animation: driftCloud 42s linear infinite 4s;
        opacity: 0.88;
    }
    .cloud-2:before {
        width: 74px;
        height: 74px;
        top: -36px;
        left: 18px;
    }
    .cloud-2:after {
        width: 92px;
        height: 92px;
        top: -42px;
        left: 58px;
    }

    .cloud-3 {
        width: 124px;
        height: 42px;
        bottom: 150px;
        left: -18%;
        animation: driftCloud 34s linear infinite 9s;
        opacity: 0.72;
    }
    .cloud-3:before {
        width: 46px;
        height: 46px;
        top: -24px;
        left: 10px;
    }
    .cloud-3:after {
        width: 62px;
        height: 62px;
        top: -28px;
        left: 38px;
    }

    .cloud-4 {
        width: 220px;
        height: 64px;
        bottom: 80px;
        left: -30%;
        animation: driftCloud 48s linear infinite 1s;
        opacity: 0.5;
        transform: scale(1.1);
    }
    .cloud-4:before {
        width: 84px;
        height: 84px;
        top: -42px;
        left: 18px;
    }
    .cloud-4:after {
        width: 108px;
        height: 108px;
        top: -52px;
        left: 64px;
    }

    .bird {
        position: absolute;
        color: rgba(0, 0, 0, 0.28);
        font-size: 22px;
        animation: flyBird 18s infinite linear;
        will-change: transform;
    }

    .bird-1 { top: 96px; left: -10%; animation-delay: 0s; }
    .bird-2 { top: 142px; left: -18%; animation-delay: 3.5s; transform: scale(0.85); }
    .bird-3 { top: 122px; left: -25%; animation-delay: 7s; transform: scale(1.05); }

    .moon {
        position: absolute;
        width: 96px;
        height: 96px;
        background: radial-gradient(circle at 30% 30%, #fffdf4 0%, var(--dark-moon-color) 58%, #d5ccb1 100%);
        border-radius: 50%;
        top: 72px;
        left: 12%;
        box-shadow:
            0 0 38px 12px rgba(245, 245, 220, 0.25),
            0 0 90px 18px rgba(148, 163, 184, 0.12),
            inset -14px -14px 0 0 rgba(0, 0, 0, 0.08);
        animation: moonFloat 15s ease-in-out infinite, moonGlow 7s ease-in-out infinite;
    }

    .moon::before,
    .moon::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        background: rgba(202, 196, 174, 0.35);
    }

    .moon::before {
        width: 16px;
        height: 16px;
        top: 26px;
        left: 24px;
    }

    .moon::after {
        width: 10px;
        height: 10px;
        top: 54px;
        left: 48px;
    }

    .stars-layer {
        z-index: 0;
    }

    .star {
        position: absolute;
        background: var(--dark-star-color);
        border-radius: 50%;
        animation: twinkle 3.6s infinite ease-in-out;
        opacity: 0;
        transition: opacity 0.8s ease;
    }

    html[data-theme="dark"] .star {
        opacity: 1;
    }

    .star-small { width: 2px; height: 2px; }
    .star-medium { width: 3px; height: 3px; }
    .star-large {
        width: 4px;
        height: 4px;
        box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.78);
    }

    .shooting-star {
        position: absolute;
        width: 140px;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95));
        transform: rotate(-32deg);
        animation: shootingStar 11s infinite linear;
        opacity: 0;
        filter: drop-shadow(0 0 8px rgba(255,255,255,0.65));
    }

    .shooting-star:before {
        content: '';
        position: absolute;
        right: 0;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 0 10px 2px white;
    }

    .theme-transition {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at var(--toggle-x, 90%) var(--toggle-y, 60px), rgba(255,255,255,0.45), transparent 0%);
        opacity: 0;
        pointer-events: none;
        z-index: 8;
    }

    .theme-transition.animate {
        animation: themeBurst 0.8s ease-out forwards;
    }

    .moon,
    .star,
    .shooting-star,
    .aurora {
        display: none;
    }

    html[data-theme="dark"] .sun,
    html[data-theme="dark"] .sun-rays,
    html[data-theme="dark"] .cloud,
    html[data-theme="dark"] .bird {
        display: none;
    }

    html[data-theme="dark"] .moon,
    html[data-theme="dark"] .star,
    html[data-theme="dark"] .shooting-star,
    html[data-theme="dark"] .aurora {
        display: block;
    }

    .login-container {
        width: 100%;
        max-width: 380px;
        background: var(--card-bg);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        border: 1px solid var(--border-color);
        transform: translateY(0);
        transition: var(--transition), border-color 0.35s ease, background 0.35s ease;
        position: relative;
        z-index: 1;
    }

    .login-container::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 30%, rgba(255,255,255,0.08));
        pointer-events: none;
    }

    .login-container:hover {
        transform: translateY(-7px) scale(1.01);
        box-shadow: 0 28px 55px rgba(15, 23, 42, 0.22);
    }

    .login-header {
        background: linear-gradient(135deg, #4361ee, #4f7cff 45%, #3a56d4 100%);
        color: white;
        text-align: center;
        padding: 25px 20px;
        position: relative;
        overflow: hidden;
    }

    .login-header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.16), transparent);
        transform: translateX(-100%);
    }

    .login-container:hover .login-header::before {
        animation: shimmer 1.8s ease-in-out;
    }

    .login-header::after {
        content: '';
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 40px;
        background: var(--card-bg);
        border-radius: 50%;
        z-index: 2;
    }

    .logo {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .logo i { font-size: 28px; color: white; }
    .login-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .login-header p { font-size: 13px; opacity: 0.92; }
    .login-form { padding: 30px 25px 25px; }

    .input-group { margin-bottom: 16px; position: relative; }
    .input-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: var(--text-color);
        font-size: 13px;
    }

    .input-icon {
        position: absolute;
        left: 15px;
        top: 38px;
        color: var(--text-light);
        font-size: 16px;
        transition: color 0.3s ease;
    }

    .input-group input {
        width: 100%;
        padding: 11px 15px 11px 40px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 12px;
        font-size: 14px;
        transition: var(--transition);
        background: rgba(255,255,255,0.32);
        color: var(--text-color);
    }

    html[data-theme="dark"] .input-group input {
        background: rgba(255,255,255,0.03);
        border-color: rgba(148, 163, 184, 0.16);
    }

    .input-group input:focus {
        border-color: var(--primary-color);
        outline: none;
        box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.12);
        transform: translateY(-1px);
    }

    .input-group:focus-within .input-icon,
    .toggle-password:hover {
        color: var(--primary-color);
    }

    .input-group input::placeholder { color: var(--text-light); }

    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        font-size: 13px;
    }

    .remember { display: flex; align-items: center; }
    .remember input { margin-right: 8px; accent-color: var(--primary-color); }
    .forgot-password {
        color: var(--primary-color);
        text-decoration: none;
        transition: var(--transition);
    }

    .forgot-password:hover { text-decoration: underline; }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #4361ee, #5681ff);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        box-shadow: 0 14px 24px rgba(67, 97, 238, 0.24);
    }

    .btn-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
        transition: 0.5s;
    }

    .btn-login:hover::before { left: 100%; }
    .btn-login:hover { opacity: 0.97; transform: translateY(-2px); }
    .btn-login:active { transform: translateY(0); }

    .error-message,
    .success-message {
        font-size: 14px;
        margin-top: 10px;
        display: none;
        text-align: center;
        padding: 10px;
        border-radius: 10px;
        backdrop-filter: blur(6px);
    }

    .error-message {
        color: var(--danger-color);
        background-color: rgba(255, 71, 87, 0.1);
        border-left: 4px solid var(--danger-color);
    }

    .success-message {
        color: var(--success-color);
        background-color: rgba(46, 213, 115, 0.1);
        border-left: 4px solid var(--success-color);
    }

    .login-footer {
        text-align: center;
        padding: 15px 0 10px;
        color: var(--text-light);
        font-size: 12px;
        border-top: 1px solid rgba(148, 163, 184, 0.14);
    }

    .theme-toggle {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(255, 255, 255, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.15);
        width: 42px;
        height: 42px;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        z-index: 10;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.32);
        transform: translateY(-2px) rotate(10deg);
    }

    .toggle-password {
        position: absolute;
        right: 15px;
        top: 38px;
        cursor: pointer;
        color: var(--text-light);
        font-size: 16px;
        user-select: none;
        transition: color 0.3s ease;
    }

    #password { padding-right: 45px; }

    .fade-in {
        animation: fadeIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
    }
    .delay-0 { animation-delay: 0.04s; }
    .delay-1 { animation-delay: 0.12s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.28s; }
    .delay-4 { animation-delay: 0.36s; }

    @keyframes sunGlow {
        0%, 100% {
            box-shadow:
                0 0 0 14px rgba(255, 223, 107, 0.18),
                0 0 60px 16px rgba(255, 215, 0, 0.45),
                0 0 120px 28px rgba(255, 207, 74, 0.22);
        }
        50% {
            box-shadow:
                0 0 0 18px rgba(255, 223, 107, 0.22),
                0 0 90px 26px rgba(255, 215, 0, 0.58),
                0 0 150px 38px rgba(255, 207, 74, 0.28);
        }
    }

    @keyframes sunDrift {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.04); }
    }

    @keyframes sunRing {
        from { transform: rotate(0deg) scale(1); }
        to { transform: rotate(360deg) scale(1.04); }
    }

    @keyframes driftCloud {
        0% { transform: translateX(0) translateY(0); }
        50% { transform: translateX(60vw) translateY(-8px); }
        100% { transform: translateX(130vw) translateY(3px); }
    }

    @keyframes flyBird {
        0% { transform: translateX(0) translateY(0) scale(1); }
        25% { transform: translateX(28vw) translateY(-14px) scale(1.02); }
        50% { transform: translateX(55vw) translateY(6px) scale(0.98); }
        75% { transform: translateX(82vw) translateY(-7px) scale(1.03); }
        100% { transform: translateX(125vw) translateY(1px) scale(1); }
    }

    @keyframes moonGlow {
        0%, 100% {
            box-shadow:
                0 0 38px 12px rgba(245, 245, 220, 0.25),
                0 0 90px 18px rgba(148, 163, 184, 0.12),
                inset -14px -14px 0 0 rgba(0, 0, 0, 0.08);
        }
        50% {
            box-shadow:
                0 0 60px 20px rgba(245, 245, 220, 0.32),
                0 0 120px 28px rgba(148, 163, 184, 0.18),
                inset -14px -14px 0 0 rgba(0, 0, 0, 0.08);
        }
    }

    @keyframes moonFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    @keyframes twinkle {
        0%, 100% { opacity: 0.25; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.35); }
    }

    @keyframes shootingStar {
        0%, 68% { opacity: 0; transform: translateX(0) translateY(0) rotate(-32deg); }
        72% { opacity: 1; }
        82% { opacity: 0; transform: translateX(-240px) translateY(180px) rotate(-32deg); }
        100% { opacity: 0; transform: translateX(-260px) translateY(200px) rotate(-32deg); }
    }

    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.985); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes themeBurst {
        0% {
            opacity: 0.5;
            background: radial-gradient(circle at var(--toggle-x, 90%) var(--toggle-y, 60px), rgba(255,255,255,0.55), transparent 0%);
        }
        100% {
            opacity: 0;
            background: radial-gradient(circle at var(--toggle-x, 90%) var(--toggle-y, 60px), rgba(255,255,255,0.08), transparent 65%);
        }
    }

    @keyframes skyBreath {
        0%, 100% { transform: scale(1) translateY(0); }
        50% { transform: scale(1.03) translateY(-6px); }
    }

    @keyframes auroraShift {
        0%, 100% { transform: translateX(0) translateY(0) scale(1); }
        50% { transform: translateX(2%) translateY(-2%) scale(1.04); }
    }

    @keyframes auroraFloat {
        0% { transform: translate3d(0, 0, 0) rotate(0deg); }
        100% { transform: translate3d(5vw, 2vh, 0) rotate(10deg); }
    }

    @keyframes horizonPulse {
        0%, 100% { transform: scale(1); opacity: 0.92; }
        50% { transform: scale(1.06); opacity: 1; }
    }

    @keyframes spinSlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
        .login-container {
            max-width: 92%;
            margin: 15px;
            border-radius: 20px;
        }

        .login-form { padding: 25px 20px 20px; }
        .login-header { padding: 20px 15px; }
        .sun, .sun-rays, .moon { width: 76px; height: 76px; }
        .sun, .sun-rays { top: 68px; right: 9%; }
        .moon { top: 68px; left: 9%; }
        .cloud { transform: scale(0.82); }
        .bird { font-size: 18px; }
        .theme-toggle { width: 38px; height: 38px; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
            scroll-behavior: auto !important;
        }
    }
  </style>
</head>
<body>
  <!-- Sky Background -->
  <div class="sky-background">
    <div class="sky-gradient"></div>
    <div class="horizon-glow"></div>
    <div class="aurora"></div>
    <div class="stars-layer" id="starsLayer"></div>
    <div class="cloud-layer">
      <div class="sun"></div>
      <div class="sun-rays"></div>
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
      <div class="bird bird-1"><i class="fas fa-dove"></i></div>
      <div class="bird bird-2"><i class="fas fa-dove"></i></div>
      <div class="bird bird-3"><i class="fas fa-dove"></i></div>
    </div>

    <div class="moon"></div>
    <div class="shooting-star" style="top: 110px; left: 84%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 260px; left: 68%; animation-delay: 4.5s;"></div>
    <div class="shooting-star" style="top: 180px; left: 92%; animation-delay: 8s;"></div>
  </div>

  <div class="theme-transition" id="themeTransition"></div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>

  <div class="login-container">
    <div class="login-header">
      <div class="logo"><i class="fas fa-tasks"></i></div>
      <h1>CSS Admin Dashboard</h1>
      <p>Silakan masuk ke akun Anda</p>
    </div>

    <div class="login-form">
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-icon"><i class="fas fa-envelope"></i></div>
        <input type="email" id="email" placeholder="Masukkan email Anda" autocomplete="email">
      </div>

      <div class="input-group">
  <label for="password">Password</label>
  <div class="input-icon"><i class="fas fa-lock"></i></div>

  <input type="password" id="password" placeholder="Masukkan password Anda" autocomplete="current-password">

  <!-- tombol show/hide password -->
  <span class="toggle-password" id="togglePassword" aria-label="Tampilkan password" role="button" tabindex="0">
    <i class="fas fa-eye"></i>
  </span>
</div>

      <div class="remember-forgot">
        <label><input type="checkbox" id="remember"> Remember me</label>
        <a href="#" id="forgotPassword">Forgot Password?</a>
      </div>

      <button class="btn-login" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
      <div class="error-message" id="loginError"></div>
      <div class="success-message" id="loginSuccess"></div>
    </div>

    <div class="login-footer">
      <p>&copy; 2025 CSS Admin Dashboard. All rights reserved.</p>
      <p id="browserInfo" style="font-size: 12px; margin-top: 5px;"></p>
    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script type="module">
    // ========== FIREBASE CONFIGURATION ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import {
        getAuth,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
        createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
    import { 
        getFirestore, 
        doc, 
        getDoc 
    } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDUZka4FZyLi_cv6X_5D4zeRsfkpqOlBpY",
        authDomain: "dashboard-css.firebaseapp.com",
        databaseURL: "https://dashboard-css-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dashboard-css",
        storageBucket: "dashboard-css.appspot.com",
        messagingSenderId: "771131792881",
        appId: "1:771131792881:web:ad634424225bd7de847850",
        measurementId: "G-3CYBC5B101"
    };

    // Initialize Firebase app and auth
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ========== DOM ELEMENTS ==========
    const loginBtn = document.getElementById("loginBtn");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");
    const loginError = document.getElementById("loginError");
    const loginSuccess = document.getElementById("loginSuccess");
    const themeToggle = document.getElementById("themeToggle");
    const forgotPassword = document.getElementById("forgotPassword");
    const browserInfo = document.getElementById("browserInfo");
    const skyBackground = document.querySelector('.sky-background');
    const starsLayer = document.getElementById('starsLayer');
    const themeTransition = document.getElementById('themeTransition');

    // Show/Hide password
togglePassword.addEventListener("click", () => {
  const isPassword = passwordInput.type === "password";
  passwordInput.type = isPassword ? "text" : "password";
  togglePassword.innerHTML = isPassword
    ? '<i class="fas fa-eye-slash"></i>'
    : '<i class="fas fa-eye"></i>';
});

// Optional: bisa juga toggle pakai Enter/Space saat fokus di ikon
togglePassword.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    togglePassword.click();
  }
});

    // ========== CREATE STARS ==========
    function createStars() {
        if (!starsLayer || starsLayer.childElementCount > 0) return;

        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.classList.add('star');

            const sizes = ['star-small', 'star-medium', 'star-large'];
            star.classList.add(sizes[Math.floor(Math.random() * sizes.length)]);

            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 4}s`;
            star.style.animationDuration = `${2.4 + Math.random() * 3.8}s`;

            if (Math.random() > 0.7) {
                star.style.opacity = '0.9';
            }

            starsLayer.appendChild(star);
        }
    }

    // ========== VALIDASI EMAIL ==========
    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    // ========== SHOW ERROR & SUCCESS MESSAGE ==========
    function showError(message) {
        loginError.textContent = message;
        loginError.style.display = "block";
        loginSuccess.style.display = "none";
        setTimeout(() => {
            loginError.style.display = "none";
        }, 5000);
    }

    function showSuccess(message) {
        loginSuccess.textContent = message;
        loginSuccess.style.display = "block";
        loginError.style.display = "none";
        setTimeout(() => {
            loginSuccess.style.display = "none";
        }, 3000);
    }

    // ========== LOGIN FUNCTION ==========
    async function handleLogin() {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
            showError("Email dan password harus diisi");
            return;
        }

        if (!isValidEmail(email)) {
            showError("Format email tidak valid");
            return;
        }

        try {
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            loginBtn.disabled = true;

            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // ✅ CEK STATUS USER DI FIRESTORE
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                
                if (!userDoc.exists()) {
                    showError("Data user tidak ditemukan. Silakan hubungi administrator.");
                    await auth.signOut();
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    loginBtn.disabled = false;
                    return;
                }

                const userData = userDoc.data();
                console.log("User status from Firestore:", userData.status);

                // ✅ CEK APAKAH USER SUSPENDED
                if (userData.status === 'Suspended') {
                    showError("Akun Anda telah di-suspend. Silakan hubungi administrator.");
                    await auth.signOut();
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    loginBtn.disabled = false;
                    return;
                }

                // ✅ LOGIN BERHASIL
                showSuccess("Login berhasil! Mengarahkan...");

                if (document.getElementById("remember").checked) {
                    localStorage.setItem("rememberEmail", email);
                } else {
                    localStorage.removeItem("rememberEmail");
                }

                // Simpan data user lengkap
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("user", JSON.stringify({
                    email: user.email,
                    uid: user.uid,
                    displayName: userData.name || "Administrator",
                    role: userData.role || "admin",
                    status: userData.status || "Active",
                    avatar: userData.image || userData.avatar || 'https://iili.io/KfDh0EN.png'
                }));

                // Simpan juga di localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    email: user.email,
                    uid: user.uid,
                    displayName: userData.name || "Administrator",
                    role: userData.role || "admin",
                    status: userData.status || "Active",
                    avatar: userData.image || userData.avatar || 'https://iili.io/KfDh0EN.png'
                }));

                localStorage.setItem('adminName', userData.name || "Administrator");
                localStorage.setItem('adminRole', userData.role || "admin");
                localStorage.setItem('adminProfileImage', userData.image || userData.avatar || 'https://iili.io/KfDh0EN.png');

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);

            } catch (firestoreError) {
                console.error("Firestore error:", firestoreError);
                showError("Gagal memuat data user. Silakan coba lagi.");
                await auth.signOut();
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                loginBtn.disabled = false;
                return;
            }

        } catch (error) {
            console.error("Login error:", error);
            let errorMessage = "Terjadi kesalahan saat login. Silakan coba lagi.";

            if (error.code) {
                switch (error.code) {
                    case "auth/user-not-found":
                    case "auth/wrong-password":
                        errorMessage = "Email atau password salah. Silakan periksa kembali.";
                        break;
                    case "auth/invalid-email":
                        errorMessage = "Format email tidak valid";
                        break;
                    case "auth/user-disabled":
                        errorMessage = "Akun dinonaktifkan. Silakan hubungi administrator.";
                        break;
                    case "auth/too-many-requests":
                        errorMessage = "Terlalu banyak percobaan gagal. Silakan coba lagi nanti.";
                        break;
                    case "auth/network-request-failed":
                        errorMessage = "Koneksi jaringan bermasalah. Periksa koneksi internet Anda.";
                        break;
                    case "auth/operation-not-allowed":
                        errorMessage = "Login dengan email dan password tidak diizinkan. Silakan hubungi administrator.";
                        break;
                    default:
                        errorMessage = "Tidak dapat mengakses sistem. Silakan coba lagi atau hubungi administrator.";
                }
            }

            showError(errorMessage);
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            loginBtn.disabled = false;
        }
    }

    // ========== FORGOT PASSWORD ==========
    async function handleForgotPassword() {
        const email = emailInput.value.trim();

        if (!email) {
            showError("Masukkan email untuk reset password");
            return;
        }

        if (!isValidEmail(email)) {
            showError("Format email tidak valid");
            return;
        }

        try {
            await sendPasswordResetEmail(auth, email);
            showSuccess("Email reset password telah dikirim. Periksa inbox Anda.");
        } catch (error) {
            console.error("Password reset error:", error);
            let errorMessage = "Terjadi kesalahan saat mengirim email reset password.";
            if (error.code === "auth/user-not-found") {
                errorMessage = "Email tidak terdaftar dalam sistem.";
            }
            showError(errorMessage);
        }
    }

    // ========== THEME TOGGLE ==========
    function toggleTheme() {
        const rect = themeToggle.getBoundingClientRect();
        document.documentElement.style.setProperty('--toggle-x', `${rect.left + rect.width / 2}px`);
        document.documentElement.style.setProperty('--toggle-y', `${rect.top + rect.height / 2}px`);

        themeTransition.classList.remove('animate');
        void themeTransition.offsetWidth;
        themeTransition.classList.add('animate');

        const current = document.documentElement.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);

        const icon = themeToggle.querySelector("i");
        icon.className = next === "dark" ? "fas fa-sun" : "fas fa-moon";

        setTimeout(() => {
            themeTransition.classList.remove('animate');
        }, 820);
    }

    function applySavedTheme() {
        const theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", theme);

        const icon = themeToggle.querySelector("i");
        icon.className = theme === "dark" ? "fas fa-sun" : "fas fa-moon";
    }

    // ========== BROWSER DETECTION ==========
    function detectBrowser() {
        const userAgent = navigator.userAgent;
        let browserName = "Unknown Browser";

        if (userAgent.includes("Firefox")) browserName = "Mozilla Firefox";
        else if (userAgent.includes("Edg")) browserName = "Microsoft Edge";
        else if (userAgent.includes("Chrome")) browserName = "Google Chrome";
        else if (userAgent.includes("Safari")) browserName = "Safari";

        browserInfo.textContent = `Browser: ${browserName}`;
    }

    // ========== EVENT LISTENERS ==========
    document.addEventListener("DOMContentLoaded", () => {
        console.log("DOM Content Loaded");

        // Create stars
        createStars();
        
        detectBrowser();
        applySavedTheme();

        // Remember email
        const rememberedEmail = localStorage.getItem("rememberEmail");
        if (rememberedEmail) {
            emailInput.value = rememberedEmail;
            document.getElementById("remember").checked = true;
        }

        // Event listeners
        loginBtn.addEventListener("click", handleLogin);
        themeToggle.addEventListener("click", toggleTheme);
        
        forgotPassword.addEventListener("click", (e) => {
            e.preventDefault();
            handleForgotPassword();
        });

        // Enter key to login
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                handleLogin();
            }
        });

        // Add fade-in animations
        const elements = document.querySelectorAll('.login-container, .input-group, .btn-login, .remember-forgot');
        elements.forEach((el, index) => {
            el.classList.add('fade-in', `delay-${index}`);
        });

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log("User already logged in:", user.email);
                // Auto redirect if already logged in
                setTimeout(() => {
                    window.location.href = "summary-dashboard.html";
                }, 1000);
            }
        });
    });

    // ========== ERROR HANDLING ==========
    window.addEventListener("error", (e) => {
        console.error("Global error:", e.error);
    });

    window.addEventListener("unhandledrejection", (e) => {
        console.error("Unhandled promise rejection:", e.reason);
        e.preventDefault();
    });
  </script>
</body>
</html>
