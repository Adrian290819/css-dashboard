    <style>
        /* Reset dan Variabel */
        :root {
            --primary-gradient: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            --success-gradient: linear-gradient(135deg, #4cc9f0 0%, #4361ee 100%);
            --warning-gradient: linear-gradient(135deg, #f72585 0%, #7209b7 100%);
            --info-gradient: linear-gradient(135deg, #4895ef 0%, #3f37c9 100%);
            --purple-gradient: linear-gradient(135deg, #7209b7 0%, #b5179e 100%);
        }

        /* ========== LAYOUT UTAMA ========== */
        .main-content {
            padding: var(--space-lg);
            background-color: var(--bg-secondary);
            min-height: 100vh;
        }

        .header {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .search-bar {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-bar i {
            position: absolute;
            left: 12px;
            color: var(--text-secondary);
        }

        .search-bar input {
            padding: var(--space-sm) var(--space-sm) var(--space-sm) 40px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: var(--text-sm);
            width: 300px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info h4 {
            margin: 0;
            font-size: var(--text-sm);
            font-weight: var(--font-semibold);
            color: var(--text-primary);
        }

        .user-info p {
            margin: 0;
            font-size: var(--text-xs);
            color: var(--text-secondary);
        }

        .menu-toggle {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-primary);
            display: none;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
        }

        /* Filter Panel */
        .filter-panel {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
            border: 1px solid var(--border-color);
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }

        .filter-title {
            font-size: var(--text-lg);
            font-weight: var(--font-semibold);
            color: var(--text-primary);
            margin: 0;
        }

        .filter-reset {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: var(--text-sm);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .filter-reset:hover {
            background: var(--hover-color);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-md);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .filter-group label {
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select, .filter-input {
            padding: var(--space-sm) var(--space-md);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--input-bg);
            color: var(--text-primary);
            font-size: var(--text-sm);
            height: 42px;
        }

        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        /* Statistics Table */
        .stats-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            margin-bottom: var(--space-xl);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: var(--text-xl);
            font-weight: var(--font-semibold);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin: 0;
        }

        .section-actions {
            display: flex;
            gap: var(--space-sm);
        }

        .btn {
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-outline {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            background: var(--hover-color);
        }

        .table-container {
            overflow-x: auto;
            margin-top: var(--space-md);
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
            min-width: 1400px;
        }

        .stats-table th {
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: var(--font-semibold);
            padding: var(--space-md);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
        }

        .stats-table td {
            padding: var(--space-md);
            color: var(--text-secondary);
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid var(--border-color-light);
        }

        .stats-table tbody tr:hover {
            background-color: var(--hover-color);
        }

        .stats-table tbody tr.total-row {
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.1), rgba(67, 97, 238, 0.05));
            font-weight: var(--font-semibold);
            border-top: 2px solid var(--border-color);
        }

        .stats-table tbody tr.total-row td {
            color: var(--text-primary);
            font-weight: var(--font-semibold);
        }

        .css-name {
            font-weight: var(--font-semibold);
            color: var(--primary);
            text-align: left;
        }

        .empty-state {
            text-align: center;
            padding: var(--space-xl) var(--space-lg);
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 2px dashed var(--border-color);
            margin: var(--space-lg) 0;
        }

        
        /* Toast Notification */
        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            color: white;
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            z-index: 9999;
            animation: slideIn 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast-notification.success {
            background: var(--success-gradient);
        }

        .toast-notification.error {
            background: var(--warning-gradient);
        }

        .toast-notification.info {
            background: var(--info-gradient);
        }

        .toast-notification.hide {
            animation: slideOut 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 1024px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: var(--space-md);
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-md);
            }
            
            .header-actions {
                width: 100%;
                flex-direction: column;
            }
            
            .search-bar {
                width: 100%;
            }
            
            .search-bar input {
                width: 100%;
            }
            
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-sm);
            }
            
            .bar-item {
                width: 45px;
            }
            
            .bar {
                width: 35px;
            }
        }
    </style>

    <div id="sidebar-container"></div>
    <button class="menu-toggle">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="header">
            <h1><i class="fas fa-chart-bar"></i> <span id="pageTitle">Statistik Promosi</span></h1>
            <div class="header-actions">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="cssSearch" placeholder="Cari CSS...">
                </div>
                <div class="user-profile">
                    <img class="profile-img" src="https://iili.io/Fpiva7S.png" alt="Profile">
                    <div class="user-info">
                        <h4 id="userName">Loading...</h4>
                        <p id="userRole">Statistik Promosi</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Panel -->
        <div class="filter-panel">
            <div class="filter-header">
                <h3 class="filter-title" id="filterTitle">Filter Statistik</h3>
                <button class="filter-reset" id="resetFilters">
                    <i class="fas fa-sync-alt"></i> <span id="resetBtnText">Reset Filters</span>
                </button>
            </div>
            <div class="filter-grid">
                <div class="filter-group">
                    <label id="periodLabel">Periode</label>
                    <select class="filter-select" id="periodFilter">
                        <option value="all" id="periodAll">Semua Waktu</option>
                        <option value="today" id="periodToday">Hari Ini</option>
                        <option value="week" id="periodWeek">Minggu Ini</option>
                        <option value="month" id="periodMonth">Bulan Ini</option>
                        <option value="year" id="periodYear">Tahun Ini</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label id="startDateLabel">Tanggal Mulai</label>
                    <input type="date" class="filter-input" id="startDateFilter">
                </div>
                <div class="filter-group">
                    <label id="endDateLabel">Tanggal Akhir</label>
                    <input type="date" class="filter-input" id="endDateFilter">
                </div>
                <div class="filter-group">
                    <label id="platformLabel">Platform</label>
                    <select class="filter-select" id="platformFilter">
                        <option value="" id="platformAll">Semua Platform</option>
                        <option value="WhatsApp" id="platformWhatsApp">WhatsApp</option>
                        <option value="Telegram" id="platformTelegram">Telegram</option>
                        <option value="Facebook" id="platformFacebook">Facebook</option>
                        <option value="Instagram" id="platformInstagram">Instagram</option>
                        <option value="Website" id="platformWebsite">Website</option>
                        <option value="Direct" id="platformDirect">Direct</option>
                        <option value="Referral" id="platformReferral">Referral</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Statistics Table -->
        <div class="stats-section">
            <div class="section-header">
                <h2 class="section-title" id="recapTitle"><i class="fas fa-table"></i> Rekapitulasi Promosi per CSS</h2>
                <div class="section-actions">
                    <button class="btn btn-outline" id="refreshStats">
                        <i class="fas fa-sync-alt"></i> <span id="refreshBtnText">Refresh</span>
                    </button>
                </div>
            </div>
            
            <div class="table-container">
                <table class="stats-table" id="statsTable">
                    <thead>
                        <tr id="tableHeaderRow1">
                            <th rowspan="2" id="thCssName">NAMA CSS</th>
                            <th rowspan="2" id="thTotalPromosi">JUMLAH PROMOSI</th>
                            <th rowspan="2" id="thJumlahLeads">JUMLAH LEADS</th>
                            <th rowspan="2" id="thLeadsFollowUp">LEADS FOLLOW UP</th>
                            <th colspan="3" id="thQualification">KUALIFIKASI</th>
                            <th colspan="5" id="thFollowUp">FOLLOW UP</th>
                            <th rowspan="2" id="thClosingan">CLOSINGAN</th>
                        </tr>
                        <tr id="tableHeaderRow2">
                            <th id="thCold">Cold</th>
                            <th id="thWarm">Warm</th>
                            <th id="thHot">Hot</th>
                            <th id="thFu1">FU 1</th>
                            <th id="thFu2">FU 2</th>
                            <th id="thFu3">FU 3</th>
                            <th id="thFu4">FU 4</th>
                            <th id="thFu5">FU 5</th>
                        </tr>
                    </thead>
                    <tbody id="statsTableBody"></tbody>
                </table>
            </div>
            
            <div id="noData" class="empty-state" style="display: none;">
                <i class="fas fa-chart-pie"></i>
                <h3 id="noDataTitle">Tidak Ada Data Statistik</h3>
                <p id="noDataMessage">Belum ada data promosi untuk ditampilkan.</p>
            </div>
        </div>
    </div>

    async function loadPromosiData() {
        const snapshot = await db.collection('promosi').get();
        promosiData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    async function loadLeadsData() {
        const snapshot = await db.collection('promosiLeads').orderBy('tanggalMasuk', 'desc').get();
        leadsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        filteredLeadsData = [...leadsData];
    }

    function processStatistics() {
        cssStats = {};
        
        cssList.forEach(css => {
            cssStats[css] = {
                nama: css, totalPromosi: 0, jumlahLeads: 0, leadsFollowUp: 0,
                cold: 0, warm: 0, hot: 0, followUp1: 0, followUp2: 0, followUp3: 0, followUp4: 0, followUp5: 0, closingan: 0
            };
        });
        
        promosiData.forEach(promosi => {
            const cssName = promosi.namaCSS ? promosi.namaCSS.toUpperCase() : '';
            for (let key in cssStats) {
                if (cssName.includes(key) || key.includes(cssName)) {
                    cssStats[key].totalPromosi++;
                    break;
                }
            }
        });
        
        filteredLeadsData.forEach(lead => {
            const cssName = lead.namaCSS ? lead.namaCSS.toUpperCase() : '';
            for (let key in cssStats) {
                if (cssName.includes(key) || key.includes(cssName)) {
                    const stat = cssStats[key];
                    stat.jumlahLeads++;
                    if (lead.leadsFollow === 'Follow') stat.leadsFollowUp++;
                    if (lead.leadQualification === 'Cold') stat.cold++;
                    if (lead.leadQualification === 'Warm') stat.warm++;
                    if (lead.leadQualification === 'Hot') stat.hot++;
                    if (lead.followUp1 && lead.followUp1.trim()) stat.followUp1++;
                    if (lead.followUp2 && lead.followUp2.trim()) stat.followUp2++;
                    if (lead.followUp3 && lead.followUp3.trim()) stat.followUp3++;
                    if (lead.followUp4 && lead.followUp4.trim()) stat.followUp4++;
                    if (lead.followUp5 && lead.followUp5.trim()) stat.followUp5++;
                    if (lead.leadStatus && lead.leadStatus.toLowerCase() === 'closing') stat.closingan++;
                    break;
                }
            }
        });
    }

    function renderStatsTable() {
        const tableBody = document.getElementById('statsTableBody');
        const noData = document.getElementById('noData');
        
        const statsArray = Object.values(cssStats).filter(stat => stat.totalPromosi > 0 || stat.jumlahLeads > 0);
        
        if (statsArray.length === 0) {
            tableBody.innerHTML = '';
            if (noData) noData.style.display = 'block';
            return;
        }
        
        if (noData) noData.style.display = 'none';
        tableBody.innerHTML = '';
        
        statsArray.sort((a, b) => b.totalPromosi - a.totalPromosi);
        
        let totals = { totalPromosi:0, jumlahLeads:0, leadsFollowUp:0, cold:0, warm:0, hot:0, followUp1:0, followUp2:0, followUp3:0, followUp4:0, followUp5:0, closingan:0 };
        
        statsArray.forEach(stat => {
            Object.keys(totals).forEach(k => totals[k] += stat[k]);
            tableBody.innerHTML += `
                <tr>
                    <td class="css-name">${stat.nama}</td>
                    <td><strong>${stat.totalPromosi}</strong></td>

                    <td>${stat.closingan}</td>
                </tr>
            `;
        });
        
        const totalText = window.totalOverallText || "TOTAL KESELURUHAN";

        const filtered = {};
        Object.keys(cssStats).forEach(key => { if (key.toLowerCase().includes(term)) filtered[key] = cssStats[key]; });
        const original = {...cssStats};
        cssStats = filtered;
        renderStatsTable();
        cssStats = original;
    }

    async function filterByPeriod() {
        const period = document.getElementById('periodFilter').value;
        const startDate = document.getElementById('startDateFilter').value;
        const endDate = document.getElementById('endDateFilter').value;
        const platform = document.getElementById('platformFilter').value;
        
        let filtered = [...leadsData];
        if (platform) filtered = filtered.filter(lead => lead.platform === platform);
        
        if (startDate && endDate) {
            filtered = filtered.filter(lead => lead.tanggalMasuk >= startDate && lead.tanggalMasuk <= endDate);
        } else if (period !== 'all') {
            const today = new Date();
            let start = new Date();
            if (period === 'today') start = today;
            else if (period === 'week') start.setDate(today.getDate() - 7);
            else if (period === 'month') start.setMonth(today.getMonth() - 1);
            else if (period === 'year') start.setFullYear(today.getFullYear() - 1);
            const startStr = start.toISOString().split('T')[0];
            const todayStr = today.toISOString().split('T')[0];
            filtered = filtered.filter(lead => lead.tanggalMasuk >= startStr && lead.tanggalMasuk <= todayStr);
        }
        
        filteredLeadsData = filtered;
        processStatistics();
        renderStatsTable();
        renderCharts();
    }

    function exportToExcel() {
        const lang = promosiTranslations[currentLanguage] || promosiTranslations['id'];
        const headers = [
            lang.thCssName, lang.thTotalPromosi, lang.thJumlahLeads, lang.thLeadsFollowUp,
            lang.thCold, lang.thWarm, lang.thHot,
            lang.thFu1, lang.thFu2, lang.thFu3, lang.thFu4, lang.thFu5, lang.thClosingan
        ];
        let csv = headers.join(',') + '\n';
        const statsArray = Object.values(cssStats).filter(s => s.totalPromosi > 0 || s.jumlahLeads > 0).sort((a,b)=>b.totalPromosi - a.totalPromosi);
        let totals = { totalPromosi:0, jumlahLeads:0, leadsFollowUp:0, cold:0, warm:0, hot:0, followUp1:0, followUp2:0, followUp3:0, followUp4:0, followUp5:0, closingan:0 };
        statsArray.forEach(s => {
            Object.keys(totals).forEach(k => totals[k] += s[k]);
            csv += `"${s.nama}",${s.totalPromosi},${s.jumlahLeads},${s.leadsFollowUp},${s.cold},${s.warm},${s.hot},${s.followUp1},${s.followUp2},${s.followUp3},${s.followUp4},${s.followUp5},${s.closingan}\n`;
        });
        const totalText = lang.totalOverall;
        csv += `"${totalText}",${totals.totalPromosi},${totals.jumlahLeads},${totals.leadsFollowUp},${totals.cold},${totals.warm},${totals.hot},${totals.followUp1},${totals.followUp2},${totals.followUp3},${totals.followUp4},${totals.followUp5},${totals.closingan}\n`;
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `statistik_promosi_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        if (window.toastMessages) {
            showToast(window.toastMessages.exportSuccess, 'success');
        } else {
            showToast('Data berhasil diexport!', 'success');
        }
    }

    function setupEventListeners() {
        document.getElementById('refreshStats')?.addEventListener('click', () => { 
            loadAllData(); 
            if (window.toastMessages) {
                showToast(window.toastMessages.refreshSuccess, 'success');
            } else {
                showToast('Data statistik diperbarui!', 'success');
            }
        });
        document.getElementById('exportExcel')?.addEventListener('click', exportToExcel);
        document.getElementById('cssSearch')?.addEventListener('input', filterBySearch);
        document.getElementById('periodFilter')?.addEventListener('change', filterByPeriod);
        document.getElementById('startDateFilter')?.addEventListener('change', filterByPeriod);
        document.getElementById('endDateFilter')?.addEventListener('change', filterByPeriod);
        document.getElementById('platformFilter')?.addEventListener('change', filterByPeriod);
        document.getElementById('resetFilters')?.addEventListener('click', resetFilters);
        
        // Menu toggle for mobile
        const menuToggle = document.querySelector('.menu-toggle');
        const sidebarContainer = document.getElementById('sidebar-container');
        if (menuToggle && sidebarContainer) {
            menuToggle.addEventListener('click', function() {
                const sidebar = sidebarContainer.querySelector('.sidebar');
                if (sidebar) {
                    sidebar.classList.toggle('active');
                }
            });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initializePromosiLanguage();
        checkAuthState();
    });
    </script>
</body>
</html>
